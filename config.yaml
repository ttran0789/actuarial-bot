# Actuarial Bot Configuration
# Copy this file to config.local.yaml and fill in your credentials

# AI provider configuration
# Supports: "openai", "azure", "custom" (Ollama, LM Studio, vLLM, etc.)
ai:
  provider: "azure"
  api_key: "YOUR_API_KEY"
  model: "gpt-4o-mini"
  temperature: 0.1
  max_tokens: 4096

  # Azure OpenAI settings (only used when provider is "azure")
  # azure_endpoint: "https://your-resource.openai.azure.com/"
  # azure_deployment: "your-deployment-name"
  # azure_api_version: "2024-10-21"

  # Custom endpoint settings (only used when provider is "custom")
  # base_url: "http://localhost:11434/v1"

oracle:
  # TNS name from your tnsnames.ora
  dsn: "YOUR_TNS_NAME"
  user: "YOUR_USERNAME"
  password: "YOUR_PASSWORD"
  # Schemas to auto-discover on connect (leave empty for current user schema)
  schemas: []
  # Max rows returned per query (safety limit)
  max_rows: 10000

# Python executor settings
python:
  # Path to python executable (uses system python if not set)
  executable: "python"
  # Timeout in seconds for script execution
  timeout: 120

# Logging
logging:
  level: "INFO"
  # log_dir: "~/Documents/actuarial-bot-logs"  # default

# UI settings
ui:
  theme: "dark"
  font_size: 11
  max_table_rows_display: 500

# Export settings
export:
  default_directory: "~/Documents"
  excel_engine: "openpyxl"
